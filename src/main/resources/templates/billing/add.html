<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Bill</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏥 Hospital MS</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Create New Bill</h4>
                    <form th:action="@{/billing/add}" th:object="${bill}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Patient</label>
                            <select class="form-select" th:field="*{patient}">
                                <option value="">Select Patient</option>
                                <option th:each="patient : ${patients}"
                                        th:value="${patient.id}"
                                        th:text="${patient.name}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Appointment</label>
                            <select class="form-select" th:field="*{appointment}">
                                <option value="">Select Appointment (optional)</option>
                                <option th:each="apt : ${appointments}"
                                        th:value="${apt.id}"
                                        th:text="${apt.patient.name} + ' - Dr.' + ${apt.doctor.name} + ' (' + ${apt.appointmentDate} + ')'">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amount (₹)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{amount}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"
                                      placeholder="e.g. Consultation fee, Lab tests..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Create Bill</button>
                            <a href="/billing" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
