<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0d6efd; }
        .card { border-radius: 12px; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0d6efd;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏥 Hospital MS</a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
            <a class="nav-link text-white" href="/patients">Patients</a>
            <a class="nav-link text-white" href="/doctors">Doctors</a>
            <a class="nav-link text-white" href="/appointments">Appointments</a>
            <a class="nav-link text-white" href="/billing">Billing</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- Dashboard -->
<div class="container mt-5">
    <h2 class="mb-4 fw-bold">Dashboard</h2>
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card stat-card shadow-sm border-0 bg-primary text-white">
                <div class="card-body text-center p-4">
                    <h1 class="fw-bold" th:text="${totalPatients}">0</h1>
                    <p class="mb-0">Total Patients</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card shadow-sm border-0 bg-success text-white">
                <div class="card-body text-center p-4">
                    <h1 class="fw-bold" th:text="${totalDoctors}">0</h1>
                    <p class="mb-0">Total Doctors</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card shadow-sm border-0 bg-warning text-white">
                <div class="card-body text-center p-4">
                    <h1 class="fw-bold" th:text="${totalAppointments}">0</h1>
                    <p class="mb-0">Appointments</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card shadow-sm border-0 bg-danger text-white">
                <div class="card-body text-center p-4">
                    <h1 class="fw-bold" th:text="${unpaidBills}">0</h1>
                    <p class="mb-0">Unpaid Bills</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Quick Links -->
    <div class="row g-4 mt-3">
        <div class="col-md-3">
            <a href="/patients/add" class="btn btn-primary w-100 py-3">+ Add Patient</a>
        </div>
        <div class="col-md-3">
            <a href="/doctors/add" class="btn btn-success w-100 py-3">+ Add Doctor</a>
        </div>
        <div class="col-md-3">
            <a href="/appointments/add" class="btn btn-warning w-100 py-3">+ Book Appointment</a>
        </div>
        <div class="col-md-3">
            <a href="/billing/add" class="btn btn-danger w-100 py-3">+ Create Bill</a>
        </div>
    </div>
</div>

</body>
</html>
